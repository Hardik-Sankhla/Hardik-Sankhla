<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice-Activated Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #121212;
            color: #fff;
        }
        h1 {
            color: #bb86fc;
        }
        p {
            font-size: 18px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
        }
        button {
            background-color: #03dac6;
            color: #000;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            margin-top: 20px;
        }
        button:hover {
            background-color: #018786;
        }
        #status {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #bb86fc;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Voice-Activated Profile</h1>
    <p>Click the button below and use voice commands like:</p>
    <p><b>"Go to projects"</b> | <b>"Show GitHub"</b> | <b>"About me"</b> | <b>"Contact info"</b></p>

    <div class="container">
        <button onclick="startListening()">🎙️ Start Voice Navigation</button>
        <p id="status">Awaiting Command...</p>
    </div>

    <script>
        function startListening() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = "en-US";
            recognition.start();
            
            document.getElementById("status").innerText = "🎤 Listening... Speak Now!";

            recognition.onresult = function(event) {
                let command = event.results[0][0].transcript.toLowerCase();
                document.getElementById("status").innerText = `✅ Recognized: "${command}"`;
                console.log("Recognized:", command);

                if (command.includes("projects")) {
                    window.location.href = "https://github.com/HardikSankhla?tab=repositories";
                } 
                else if (command.includes("github")) {
                    window.location.href = "https://github.com/HardikSankhla";
                }
                else if (command.includes("about me")) {
                    alert("Hardik Sankhla | AI & ML Engineer | Data Scientist | NLP Expert");
                }
                else if (command.includes("contact")) {
                    alert("📧 Email: datascientist.hardiksankhla@gmail.com");
                }
                else if (command.includes("who are you")) {
                    alert("I am an AI assistant created by Hardik Sankhla! 🚀");
                }
                else {
                    alert("Command not recognized. Try 'Go to projects' or 'Show GitHub'.");
                }
            };

            recognition.onerror = function(event) {
                console.error("Error:", event.error);
                document.getElementById("status").innerText = "❌ Voice recognition failed. Try again!";
            };
        }
    </script>

</body>
</html>
