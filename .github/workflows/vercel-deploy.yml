name: Vercel Deploy

on:
  push:
    branches:
      - main
    paths:
      - apps/web/**
      - content/**
      - scripts/sync-content.mjs
      - vercel.json
      - .github/workflows/vercel-deploy.yml
  pull_request:
    branches:
      - main
    paths:
      - apps/web/**
      - content/**
      - scripts/sync-content.mjs
      - vercel.json
      - .github/workflows/vercel-deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Quality Gate (Web)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Sync generated content
        run: node scripts/sync-content.mjs

      - name: Verify generated content is committed
        run: |
          git diff --exit-code -- apps/web/generated apps/docs/docs || {
            echo "Generated content is out of date. Run: node scripts/sync-content.mjs and commit updated files.";
            exit 1;
          }

      - name: Install web dependencies
        run: npm ci
        working-directory: apps/web

      - name: Build web app
        run: npm run build
        working-directory: apps/web

  deploy-preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'pull_request'

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync generated content
        run: node scripts/sync-content.mjs

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy_preview
        run: |
          preview_url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} | tail -n 1)
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy_preview.outputs.preview_url }}';
            if (!previewUrl) {
              core.warning('Preview URL missing from deploy step output.');
              return;
            }

            const body = [
              '### Vercel Preview Deployment',
              '',
              `Preview URL: ${previewUrl}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  deploy-production:
    name: Deploy Production (main)
    runs-on: ubuntu-latest
    needs: quality-gate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment:
      name: production

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync generated content
        run: node scripts/sync-content.mjs

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
